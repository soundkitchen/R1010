name: R1010
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
targets:
  R1010:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/R1010App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.izukawa.R1010
        PRODUCT_NAME: R1010
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: R-1010
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - R1010Tests
  R1010Tests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/R1010Tests
    dependencies:
      - target: R1010
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/R1010.app/Contents/MacOS/R1010"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  R1010 Preview:
    build:
      targets:
        R1010: all
    run:
      config: Debug
      environmentVariables:
        R1010_SKIP_RUNTIME_BOOT: "1"
    management:
      shared: true
      isShown: true
      orderHint: 1
